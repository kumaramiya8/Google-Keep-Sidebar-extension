<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Keep Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-area">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H15C15 21.55 14.55 22 14 22H10C9.45 22 9 21.55 9 21ZM12 2C7.58 2 4 5.58 4 10C4 12.82 5.46 15.3 7.68 16.74C8.48 17.26 9 18.15 9 19H15C15 18.15 15.52 17.26 16.32 16.74C18.54 15.3 20 12.82 20 10C20 5.58 16.42 2 12 2Z" fill="#fbbc04"/>
        </svg>
        <h1>Google Keep</h1>
      </div>
    </header>

    <main class="popup-content">
      <!-- Zoom Settings Group -->
      <div class="settings-group">
        <label class="group-label">Sidebar Zoom</label>
        <div class="zoom-controls">
          <button id="btn-zoom-out" class="zoom-btn" title="Zoom Out">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <span id="zoom-label">75%</span>
          <button id="btn-zoom-in" class="zoom-btn" title="Zoom In">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Action Button -->
      <button id="btn-open-sidebar" class="primary-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        Open Keep Sidebar
      </button>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
